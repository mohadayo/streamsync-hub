version: "3.8"

services:
  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      - GATEWAY_PORT=8080
      - PROCESSOR_URL=http://processor:8081
      - DASHBOARD_URL=http://dashboard:3000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - streamsync

  processor:
    build: ./processor
    ports:
      - "${PROCESSOR_PORT:-8081}:8081"
    environment:
      - PROCESSOR_PORT=8081
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - streamsync

  dashboard:
    build: ./dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      - DASHBOARD_PORT=3000
      - GATEWAY_URL=http://gateway:8080
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - streamsync

networks:
  streamsync:
    driver: bridge
